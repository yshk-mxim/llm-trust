name: gate

on:
  push:
  pull_request:

jobs:
  offline-gate:
    # Runs on Linux: the artifact is developed on macOS, so a green Linux run is the cross-platform check.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev tools (pinned)
        run: python -m pip install -r requirements-dev.txt
      - name: Offline gate -- lint + format-check + unit tests
        run: make check
      - name: Authority non-interference proof
        run: make proof
